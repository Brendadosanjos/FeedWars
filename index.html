<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Star Wars</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center font-sans text-sm">
    <header class="bg-gray-800 w-full py-3 flex justify-center gap-2 font-extralight items-center">
        <img src="img/logo.d936f60f.svg" alt="logo" class="size-10">
        <h1 class="text-xl font-extrabold text-white text-center">Feed Wars</h1>
    </header>
    
    <main class="flex w-full p-7 gap-5">
        <!-- Caixa de perfil -->
        <div class="bg-gray-800 w-52 h-64 rounded-xl text-center text-slate-400 ml-16">
            <img src="img/backgroundcard.jpg" alt="background" class="w-full h-16 object-cover p-0">
            <img src="img/foroperfil.jpg" alt="perfil" class="w-16 border border-blue-800 rounded-xl mx-auto -mt-6 relative">
            <h4 class="text-white mt-2 font-bold">Darth Vader</h4>
            Sith
            <hr class="border-gray-600 my-4">
            <button class="w-36 h-10 text-blue-400 border border-blue-400 rounded-lg">Editar seu perfil</button>
        </div>
        
        <!-- Caixa de comentários -->
        <ul class="flex-1 bg-gray-800 rounded-xl p-5 text-slate-400 mr-16">
            <li class="bg-gray-700 p-4 rounded-xl mb-4">
                Lorem ipsum, dolor sit amet consectetur adipisicing elit. At aperiam impedit aut natus non ratione voluptatem aliquid fugiat ex deserunt unde eligendi quidem necessitatibus, vitae suscipit consequuntur illo dolorum. Illo.
            </li> 
            <!-- Adicione mais itens de comentário, se necessário -->
        </ul>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
